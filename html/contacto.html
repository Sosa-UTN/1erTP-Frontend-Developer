<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/general.css">
    <script src="https://kit.fontawesome.com/87c4739cb9.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Formulario de contacto -->
    <header>
        <nav>
            <ul>
                <li> <a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="cards.html"><i class="fa-solid fa-bag-shopping"></i> Cards</a></li>
                <li><a href="galeria.html"><i class="fa-solid fa-image"></i> Galería</a></li>
                <li><a href="contacto.html"><i class="fa-solid fa-phone"></i> Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="flex-container">
                <form class="form-container" method="post">

                    <!-- Nombre -->
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre">

                    <!-- Email -->
                    <input type="email" id="correo" name="correo" placeholder="Email">

                    <!-- Teléfono -->
                    <input type="tel" id="telefono" name="telefono" placeholder="Teléfono">

                    <!-- Comentario (Textarea) -->
                    <textarea id="mensaje" name="mensaje" rows="4" cols="30"
                        placeholder="Escribe tu comentario aquí..."></textarea>

                    <!-- Selector (El "placeholder" es la primera opción) -->
                    <select id="opciones" name="opciones">
                        <option value="" disabled selected>Elige una opción...</option>
                        <option value="web">Diseño Web</option>
                        <option value="app">App Móvil</option>
                    </select>

                    <!-- Radio Buttons (Necesitan label para saber qué es cada uno) -->
                    <div>
                        <p>Género:</p>
                        <div>
                            <input type="radio" id="masc" name="genero" value="m"> <label for="masc">Masculino</label>
                        </div>
                        <input type="radio" id="fem" name="genero" value="f"> <label for="fem">Femenino</label>
                    </div>

                    <!-- Checkbox -->
                    <br>
                    <input type="checkbox" id="terminos" name="terminos">
                    <label for="terminos">Acepto los términos</label>

                    <!-- Botones de Acción -->
                    <div>
                        <button type="">Enviar Formulario</button>
                        <button type="">Limpiar campos</button>
                    </div>

                </form>
        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
